name: PR Checks

# Full gate on every PR to integration branches. With branch protection enabled,
# a red run BLOCKS merge. Pure-python unit tests — no LEAN/docker/cloud spend.
on:
  pull_request:
    branches: [mainV2, main]
  push:
    branches: [mainV2, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install toolchain + test-runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pandas numpy

      - name: mypy --strict (src/)
        run: mypy

      - name: pytest (full suite)
        run: pytest

      # ── #272 fail-loud phase-stack gate ──
      # A champion config MUST wire entry+exit phases; a fixture (champion_asis)
      # must carry is_fixture=True through the build. The engine invariants test
      # validates the gate is enforced at init.
      - name: #272 liveness / fail-loud gate
        run: pytest tests/engine/test_invariants.py -v --tb=short

      # ── Build-script check ──
      # The dist/ closure must build cleanly for the active champion and import
      # without error. This is the single point of failure (#211).
      - name: Build cloud package (champion_asis fixture)
        run: |
          python -c "import build.cloud_package as cp; r=cp.build('strategies.champion_asis'); print(r.config_hash)"

      # ── Dist-pin check ──
      # dist/_manifest.json must track the current HEAD commit. If dist/ is stale
      # (built from an older commit), the deployed code won't match the repo state.
      - name: Verify dist/ is pinned to HEAD
        run: |
          MANIFEST_COMMIT=$(python -c "import json; print(json.load(open('dist/_manifest.json'))['git_commit'])")
          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$MANIFEST_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "ERROR: dist/ is stale — manifest built at $MANIFEST_COMMIT but HEAD is $HEAD_COMMIT"
            echo "Run: python -m build.cloud_package strategies.champion_asis"
            exit 1
          fi
          echo "dist/ pinned to HEAD: $HEAD_COMMIT"

      # ── Provenance / marker completeness ──
      # Structural guard: the manifest must declare every phase kind wired in the
      # config, AND non-fixture champions must include entry-confirm phases (#272).
      # This is the CI-side complement to the runtime DegradedConfigError gate.
      - name: Verify phase markers in dist
        run: |
          python -c "
          import json, sys
          m = json.load(open('dist/_manifest.json'))
          phases = m.get('phase_markers', {})
          is_fixture = m.get('is_fixture', False)
          # Base phases (all configs)
          required = ['universe', 'signal', 'sizing', 'exit_hard', 'regime', 'diagnostics']
          missing = [p for p in required if p not in phases or not phases[p]]
          # #272: non-fixture champions MUST wire at least one entry-confirm phase
          # (matches runtime OR-gate: any(entry_selection, entry_timing) satisfies)
          if not is_fixture:
              has_entry = any(phases.get(k) for k in ('entry_selection', 'entry_timing'))
              if not has_entry:
                  missing.append('entry_selection|entry_timing (at least one required)')
          if missing:
              print(f'ERROR: missing phase markers: {missing} (is_fixture={is_fixture})')
              sys.exit(1)
          print(f'OK: {len(phases)} phase markers present (is_fixture={is_fixture})')
          "
