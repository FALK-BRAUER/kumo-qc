# Type-check SOURCE only. dist/ is a generated artifact (tracked, not linted). #208
[mypy]
python_version = 3.12
strict = True
mypy_path = src
files = src
# Belt-and-suspenders: never type-check generated/archived/output trees.
exclude = (?x)(^dist/ | ^archive/ | ^backtests/ | /backtests/ | ^sweeps/runs/)

# QC's AlgorithmImports is dynamic — stubs not available locally.
[mypy-AlgorithmImports.*]
ignore_missing_imports = True

# runtime.lean_entry's QCAlgorithm subclass necessarily subclasses an Any (QC base has no
# local stubs). Relax ONLY subclassing-any for this one module — its pure loader functions
# (load_universe / verify / active_set_hash) stay fully strict.
[mypy-runtime.lean_entry]
disallow_subclassing_any = False

[mypy-QuantConnect.*]
ignore_missing_imports = True

# pandas/numpy used by oracle_helpers + signal/regime phases (LEAN ships them at runtime;
# stubs not installed in the dev venv).
[mypy-pandas.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True
